<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Sản phẩm</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    input {
      padding: 8px;
      margin-right: 5px;
      margin-bottom: 10px;
    }
    button {
      padding: 8px 15px;
      background-color: #28a745;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 3px;
    }
    button:hover {
      background-color: #218838;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: #007bff;
      color: white;
      cursor: pointer; 
    }
    tbody tr:nth-child(even) {
      background-color: #f2f2f2;
    }
    tbody tr:hover {
      background-color: #e2eefb;
    }
  </style>
</head>
<body>

  <h2>Thêm Sản Phẩm Mới</h2>
  <div>
    <input type="text" id="input-name" placeholder="Tên sản phẩm">
    <input type="text" id="input-category" placeholder="Danh mục">
    <input type="number" id="input-price" placeholder="Đơn giá" min="1">
    <input type="number" id="input-quantity" placeholder="Số lượng" min="1">
    <button id="btn-add">Thêm</button>
  </div>

  <table id="product-table">
    <thead>
      <tr>
        <th>STT</th>
        <th id="sort-name" onclick="sortByName()">Tên sản phẩm <span id="sort-icon"></span></th>
        <th>Danh mục</th>
        <th>Đơn giá</th>
        <th>Số lượng</th>
      </tr>
    </thead>
    <tbody>
      </tbody>
  </table>

  <script>
    let products = [];
    let isAscending = false;


    function loadProducts() {
      const xhr = new XMLHttpRequest();
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          products = JSON.parse(xhr.responseText);
          renderTable();
        }
      };
      xhr.open('GET', 'products.json');
      xhr.send();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadProducts);
    } else {
      loadProducts();
    }

    function renderTable() {
      const tbody = document.querySelector('#product-table tbody');
      tbody.innerHTML = ''; 

      products.forEach((product, index) => {
        const tr = document.createElement('tr');
        
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${product.name}</td>
          <td>${product.category}</td>
          <td>${product.price.toLocaleString('vi-VN')} đ</td>
          <td>${product.quantity}</td>
        `;
        
        tbody.appendChild(tr);
      });
    }

    function sortByName() {
      isAscending = !isAscending;

      products.sort((a, b) => {
        const nameA = a.name.toLowerCase();
        const nameB = b.name.toLowerCase();
        
        if (nameA < nameB) return isAscending ? -1 : 1;
        if (nameA > nameB) return isAscending ? 1 : -1;
        return 0;
      });

      const sortIcon = document.getElementById('sort-icon');
      sortIcon.textContent = isAscending ? '▲' : '▼';

      renderTable();
    }

    document.getElementById('btn-add').addEventListener('click', function() {
      const nameInput = document.getElementById('input-name');
      const categoryInput = document.getElementById('input-category');
      const priceInput = document.getElementById('input-price');
      const quantityInput = document.getElementById('input-quantity');

      const name = nameInput.value.trim();
      const category = categoryInput.value.trim();
      const price = Number(priceInput.value);
      const quantity = Number(quantityInput.value);

      if (name.length < 3) {
        alert("Tên sản phẩm không được rỗng và phải có ít nhất 3 ký tự!");
        return;
      }
      if (price <= 0) {
        alert("Đơn giá phải là số dương!");
        return;
      }
      if (!Number.isInteger(quantity) || quantity < 1) {
        alert("Số lượng phải là số nguyên và lớn hơn hoặc bằng 1!");
        return;
      }

      const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;
      
      const newProduct = {
        id: newId,
        name: name,
        category: category,
        price: price,
        quantity: quantity
      };

      products.push(newProduct);
      renderTable();

      nameInput.value = '';
      categoryInput.value = '';
      priceInput.value = '';
      quantityInput.value = '';
    });
  </script>
</body>
</html>
